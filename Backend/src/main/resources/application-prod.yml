spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:mysql://${DB_HOST}:3306/${DB_NAME}?useSSL=true&requireSSL=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.MySQL8Dialect

  h2:
    console:
      enabled: false

  sql:
    init:
      mode: never

  data:
    redis:
      host: ${REDIS_HOST}
      port: 6379
      ssl:
        enabled: false

  security:
    cors:
      allowed-origins: https://kkybot.click,https://www.kkybot.click


jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 3600000
  refresh-token-expiration: 604800000

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

server:
  port: 8080

logging:
  level:
    com.baseball.ticket: INFO

cloud:
  aws:
    region:
      static: eu-west-2