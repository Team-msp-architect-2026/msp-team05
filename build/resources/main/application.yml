spring:
  datasource:
    url: jdbc:h2:mem:baseball_ticket
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  data:
    redis:
      host: localhost
      port: 6379

  sql:
    init:
      mode: always

jwt:
  secret: baseball-ticket-jwt-secret-key-must-be-at-least-32-characters
  access-token-expiration: 3600000
  refresh-token-expiration: 604800000

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

server:
  port: 8080

logging:
  level:
    com.baseball.ticket: DEBUG